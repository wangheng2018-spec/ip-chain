<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - IP-Chain</title>
</head>
<body>
  <section class="page-header">
    <div class="container">
      <h1>Marketplace</h1>
      <p>Discover and trade unique IP assets from creators worldwide.</p>
    </div>
  </section>

  <section style="padding: 32px 0 80px;">
    <div class="container">
      <!-- Search & Sort -->
      <div class="search-sort-bar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search by title or creator..." />
        </div>
        <select class="sort-select">
          <option value="newest">Newest First</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
        </select>
      </div>

      <!-- Category Filters -->
      <div class="filter-bar">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn cat-art" data-cat="art">🎨 Art</button>
        <button class="filter-btn cat-music" data-cat="music">🎵 Music</button>
        <button class="filter-btn cat-code" data-cat="code">💻 Code</button>
        <button class="filter-btn cat-writing" data-cat="writing">📖 Writing</button>
        <button class="filter-btn cat-knowledge" data-cat="knowledge">📚 Knowledge</button>
      </div>

      <!-- IP Grid -->
      <div class="ip-grid"></div>
    </div>
  </section>
  <script>
    // Marketplace init handled by app.js
  
  let shareTokenId = null;
  function openShareModal(tokenId) { shareTokenId = tokenId; document.getElementById("share-modal").classList.add("show"); }
  function closeShareModal() { document.getElementById("share-modal").classList.remove("show"); }
  function shareOnTwitter() {
    var url = window.location.origin + "/pages/verify.html";
    window.open("https://twitter.com/intent/tweet?text=IP-Chain+Verified+Asset&url=" + encodeURIComponent(url), "_blank");
    closeShareModal();
  }
  function shareOnTelegram() {
    var url = window.location.origin + "/pages/verify.html";
    window.open("https://t.me/share/url?url=" + encodeURIComponent(url) + "&text=IP-Chain+Verified+Asset", "_blank");
    closeShareModal();
  }
  function copyShareLink() {
    var url = window.location.origin + "/pages/verify.html";
    navigator.clipboard.writeText(url).then(function() { alert("Link copied!"); });
    closeShareModal();
  }
  var paymentTokenId = null;
  function openPaymentModal(tokenId, price) {
    paymentTokenId = tokenId;
    document.getElementById("payment-asset-info").textContent = "Token #" + tokenId + " | Price: " + price + " ETH";
    document.getElementById("payment-modal").classList.add("show");
  }
  function closePaymentModal() { document.getElementById("payment-modal").classList.remove("show"); }
  function payWithCrypto() {
    closePaymentModal();
    if (typeof buyIP === "function") buyIP(paymentTokenId);
    else alert("Please connect your wallet first");
  }
  function payWithCard() {
    closePaymentModal();
    fetch("/api/payments/create-checkout", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({token_id: paymentTokenId})
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (data.url) window.location.href = data.url;
      else alert("Payment error");
    }).catch(function() { alert("Payment service unavailable. Try crypto instead."); });
  }

</script>
  <!-- Share Modal -->
  <div class="share-modal" id="share-modal">
    <div class="share-modal-content">
      <h3>Share This IP</h3>
      <div class="share-options">
        <button class="share-btn" onclick="shareOnTwitter()"><span class="icon">X</span> Twitter / X</button>
        <button class="share-btn" onclick="shareOnTelegram()"><span class="icon">T</span> Telegram</button>
        <button class="share-btn" onclick="copyShareLink()"><span class="icon">L</span> Copy Link</button>
      </div>
      <button class="btn btn-outline modal-close" onclick="closeShareModal()">Close</button>
    </div>
  </div>

  <!-- Payment Modal -->
  <div class="payment-modal" id="payment-modal">
    <div class="share-modal-content">
      <h3>Purchase IP Asset</h3>
      <p id="payment-asset-info" style="color:var(--muted);margin-bottom:16px"></p>
      <div class="payment-options">
        <div class="payment-option" onclick="payWithCrypto()">
          <span class="icon">C</span>
          <div class="info"><strong>Pay with Crypto</strong><span>MetaMask / WalletConnect</span></div>
        </div>
        <div class="payment-option" onclick="payWithCard()">
          <span class="icon">D</span>
          <div class="info"><strong>Pay with Card</strong><span>Credit / Debit Card (Stripe)</span></div>
        </div>
      </div>
      <button class="btn btn-outline modal-close" onclick="closePaymentModal()">Cancel</button>
    </div>
  </div>

</body>
</html>
